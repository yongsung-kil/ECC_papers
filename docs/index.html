<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LDPC 논문 분석 탐색기 (stage3)</title>
<style>
  :root{
    --bg:#f6f7f9; --panel:#ffffff; --panel2:#f0f2f5; --border:#d8dce3;
    --text:#1c2330; --muted:#5c6675; --accent:#2563eb; --accent-fg:#ffffff;
    --chip:#e8edf6; --chip-fg:#274690; --row-hover:#eef3fb; --shadow:rgba(20,30,50,.15);
    --tag-h:#c2410c; --tag-q:#7c3aed; --tag-r:#0f766e; --tag-l:#b45309;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0e1117; --panel:#161b22; --panel2:#1b222c; --border:#2a323d;
      --text:#e6edf3; --muted:#9aa5b1; --accent:#3b82f6; --accent-fg:#ffffff;
      --chip:#1f2a3d; --chip-fg:#93b4f5; --row-hover:#1a2230; --shadow:rgba(0,0,0,.5);
      --tag-h:#fb923c; --tag-q:#c4b5fd; --tag-r:#5eead4; --tag-l:#fcd34d;
    }
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:system-ui,-apple-system,"Segoe UI","Malgun Gothic","Apple SD Gothic Neo",sans-serif;
    background:var(--bg); color:var(--text); font-size:14px; line-height:1.45;
  }
  header{padding:16px 20px 10px; border-bottom:1px solid var(--border); background:var(--panel);}
  header h1{margin:0 0 4px; font-size:18px; font-weight:650;}
  header .meta{color:var(--muted); font-size:12.5px;}
  header .meta b{color:var(--text);}
  main{padding:14px 20px 60px; max-width:1500px; margin:0 auto;}

  /* filter panel */
  .filters{background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:12px 14px; margin-bottom:14px;}
  .frow{display:flex; flex-wrap:wrap; gap:8px 10px; align-items:flex-end;}
  .frow + .frow{margin-top:10px;}
  .fld{display:flex; flex-direction:column; gap:3px;}
  .fld label{font-size:11px; color:var(--muted); font-weight:600; letter-spacing:.02em;}
  input[type=text],input[type=number],input[type=search]{
    font:inherit; padding:6px 8px; border:1px solid var(--border); border-radius:7px;
    background:var(--panel2); color:var(--text); min-width:0;
  }
  #search{min-width:280px; flex:1 1 280px;}
  input[type=number]{width:104px;}
  .yr{width:78px;}

  /* multiselect dropdown */
  .ms{position:relative;}
  .ms>button{
    font:inherit; cursor:pointer; padding:6px 26px 6px 9px; border:1px solid var(--border);
    border-radius:7px; background:var(--panel2); color:var(--text); text-align:left; white-space:nowrap;
    min-width:120px; position:relative;
  }
  .ms>button::after{content:"▾"; position:absolute; right:9px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:11px;}
  .ms>button.active{border-color:var(--accent); color:var(--accent); font-weight:600;}
  .ms .panel{
    position:absolute; z-index:40; top:calc(100% + 4px); left:0; min-width:190px; max-height:300px; overflow:auto;
    background:var(--panel); border:1px solid var(--border); border-radius:8px; box-shadow:0 8px 24px var(--shadow);
    padding:6px; display:none;
  }
  .ms.open .panel{display:block;}
  .ms .panel label{display:flex; align-items:center; gap:7px; padding:4px 6px; border-radius:6px; cursor:pointer; font-size:13px; white-space:nowrap;}
  .ms .panel label:hover{background:var(--row-hover);}
  .ms .panel .cnt{margin-left:auto; color:var(--muted); font-size:11px;}
  .ms .panel .clr{width:100%; margin-top:4px; font:inherit; font-size:12px; cursor:pointer; background:transparent; border:1px dashed var(--border); border-radius:6px; color:var(--muted); padding:4px;}

  /* buttons */
  .presets{display:flex; flex-wrap:wrap; gap:7px; margin-top:11px; padding-top:11px; border-top:1px dashed var(--border);}
  .btn{font:inherit; font-size:12.5px; cursor:pointer; padding:6px 11px; border-radius:20px; border:1px solid var(--border); background:var(--panel2); color:var(--text);}
  .btn:hover{border-color:var(--accent); color:var(--accent);}
  .btn.reset{border-color:var(--border); color:var(--muted);}
  .btn.reset:hover{border-color:#dc2626; color:#dc2626;}

  .countbar{display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; margin:2px 2px 10px; color:var(--muted); font-size:12.5px;}
  .countbar b{color:var(--text); font-size:15px;}

  /* table */
  .tablewrap{overflow-x:auto; border:1px solid var(--border); border-radius:10px; background:var(--panel);}
  table{border-collapse:collapse; width:100%; min-width:920px; font-size:13px;}
  thead th{
    position:sticky; top:0; background:var(--panel2); text-align:left; padding:9px 10px; font-weight:650;
    border-bottom:1px solid var(--border); cursor:pointer; user-select:none; white-space:nowrap; color:var(--text);
  }
  thead th .arw{color:var(--accent); font-size:11px; margin-left:3px;}
  thead th.num{text-align:right;}
  tbody td{padding:8px 10px; border-bottom:1px solid var(--border); vertical-align:top;}
  tbody td.num{text-align:right; font-variant-numeric:tabular-nums; white-space:nowrap;}
  tbody tr{cursor:pointer;}
  tbody tr:hover{background:var(--row-hover);}
  td.title{max-width:460px;}
  td.title .t{color:var(--accent); font-weight:550;}
  .tag{display:inline-block; font-size:10.5px; font-weight:700; padding:1px 6px; border-radius:5px; border:1px solid currentColor; margin-right:3px;}
  .tag.H{color:var(--tag-h)} .tag.Q{color:var(--tag-q)} .tag.R{color:var(--tag-r)} .tag.L{color:var(--tag-l)}
  .pill{display:inline-block; padding:1px 7px; border-radius:5px; background:var(--chip); color:var(--chip-fg); font-size:12px; font-weight:600;}
  .muted{color:var(--muted);}

  /* pagination */
  .pager{display:flex; align-items:center; justify-content:center; gap:8px; margin:14px 0 0; flex-wrap:wrap;}
  .pager button{font:inherit; cursor:pointer; padding:5px 11px; border:1px solid var(--border); border-radius:7px; background:var(--panel2); color:var(--text);}
  .pager button:disabled{opacity:.4; cursor:default;}
  .pager .info{color:var(--muted); font-size:12.5px;}

  /* detail modal */
  .overlay{position:fixed; inset:0; background:rgba(10,15,25,.55); display:none; align-items:flex-start; justify-content:center; padding:40px 16px; z-index:100; overflow:auto;}
  .overlay.open{display:flex;}
  .modal{background:var(--panel); border:1px solid var(--border); border-radius:12px; max-width:820px; width:100%; box-shadow:0 16px 48px var(--shadow);}
  .modal .mh{display:flex; justify-content:space-between; gap:14px; align-items:flex-start; padding:16px 18px 12px; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--panel); border-radius:12px 12px 0 0;}
  .modal .mh h2{margin:0; font-size:16px; line-height:1.35;}
  .modal .mh .sub{color:var(--muted); font-size:12.5px; margin-top:4px;}
  .modal .x{font:inherit; font-size:20px; line-height:1; cursor:pointer; border:none; background:transparent; color:var(--muted); padding:2px 6px;}
  .modal .mb{padding:14px 18px 20px;}
  .kv{display:grid; grid-template-columns:150px 1fr; gap:6px 14px; align-items:start;}
  .kv dt{color:var(--muted); font-size:12px; font-weight:600; padding-top:1px;}
  .kv dd{margin:0; word-break:break-word;}
  .section-t{font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; margin:16px 0 6px;}
  .freetext{background:var(--panel2); border:1px solid var(--border); border-radius:8px; padding:9px 11px; line-height:1.55;}
  .srclink{display:inline-block; margin-top:14px; padding:7px 13px; background:var(--accent); color:var(--accent-fg); border-radius:8px; text-decoration:none; font-weight:600; font-size:13px;}
  a{color:var(--accent);}
  .empty{padding:40px; text-align:center; color:var(--muted);}
  @media (max-width:640px){
    main{padding:12px 10px 60px;}
    .kv{grid-template-columns:1fr;}
    .kv dt{padding-top:8px;}
  }
</style>
</head>
<body>
<header>
  <h1>LDPC 논문 분석 탐색기 <span class="muted" style="font-size:13px;font-weight:400">(stage3)</span></h1>
  <div class="meta">
    표시 <b id="shownCount">0</b> / 전체 <b id="totalCount">0</b>편
    · 데이터 생성일 <b id="genDate">-</b>
    · 원본 <a href="https://github.com/yongsung-kil/ECC_papers" target="_blank" rel="noopener">ECC_papers</a>
  </div>
</header>

<main>
  <div class="filters" id="filters">
    <div class="frow">
      <div class="fld" style="flex:1 1 280px;">
        <label for="search">검색 (제목 · 핵심기여 / 공백 다중 토큰 AND)</label>
        <input type="search" id="search" placeholder="예: min-sum layered">
      </div>
      <div class="fld">
        <label>rate_max ≥</label>
        <input type="number" id="rateMin" step="0.01" min="0" max="1" placeholder="0.0">
      </div>
      <div class="fld">
        <label>length_max ≥ (bit)</label>
        <input type="number" id="lengthMin" step="1" min="0" placeholder="0">
      </div>
      <div class="fld">
        <label>연도 (min ~ max)</label>
        <div style="display:flex;gap:5px;align-items:center;">
          <input type="number" id="yearMin" class="yr" placeholder="1991">
          <span class="muted">~</span>
          <input type="number" id="yearMax" class="yr" placeholder="2026">
        </div>
      </div>
    </div>
    <div class="frow" id="msRow"></div>
    <div class="presets" id="presets">
      <button class="btn" data-preset="reselect">재선별 전체 (H∪Q∪R∪L)</button>
      <button class="btn" data-preset="H">H · hard-decision</button>
      <button class="btn" data-preset="Q">Q · 내부 양자화</button>
      <button class="btn" data-preset="R">R · rate ≥ 0.8</button>
      <button class="btn" data-preset="L">L · length ≥ 2KB</button>
      <button class="btn" data-preset="rec">추천도 상</button>
      <button class="btn reset" data-preset="clear">필터 초기화</button>
    </div>
  </div>

  <div class="countbar">
    <span><b id="matchCount">0</b>편 일치</span>
    <span id="pageInfo" class="muted"></span>
  </div>

  <div class="tablewrap">
    <table>
      <thead><tr id="theadRow"></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div id="emptyMsg" class="empty" style="display:none;">조건에 맞는 논문이 없습니다.</div>

  <div class="pager" id="pager"></div>
</main>

<div class="overlay" id="overlay">
  <div class="modal" id="modal" role="dialog" aria-modal="true"></div>
</div>

<script>
"use strict";

// ---------- 필드 메타 ----------
var VTYPE_LABEL = {ieee_journal:"IEEE Journal", ieee_conference:"IEEE Conference", arxiv:"arXiv", other:"기타"};

// 다중선택 enum 필터 (라벨, key, 선호 정렬 순서)
var ENUM_FIELDS = [
  {key:"portability",    label:"이식성",        order:["상","중","하","미상"]},
  {key:"recommend",      label:"추천도",        order:["상","중","하","미상"]},
  {key:"nand_relevance", label:"NAND관련성",    order:["직접","간접","낮음","미상"]},
  {key:"target",         label:"대상",          order:["decoder","encoder","both","code-design","other","미상"]},
  {key:"code_type",      label:"부호종류",      order:["QC-LDPC","SC-LDPC","regular","irregular","protograph","기타","미상"]},
  {key:"soft_quant",     label:"연판정",        order:["hard-1bit","soft-2~3bit","soft-4bit+","무관","N/A","미상"]},
  {key:"hw_designed",    label:"HW설계",        order:["O","X","미상"]},
  {key:"verification",   label:"검증수준",      order:["이론","시뮬","FPGA","ASIC합성","실측","미상"]},
  {key:"parallelism",    label:"병렬화",        order:["없음","부분","완전병렬","N/A","미상"]},
  {key:"correction_gain",label:"정정능력향상",  order:["O","X","N/A","미상"]},
  {key:"improve_region", label:"개선영역",      order:["waterfall","error-floor","both","N/A","미상"]},
  {key:"iter_reduction", label:"iteration감소", order:["O","부분","X","N/A","미상"]},
  {key:"latency",        label:"latency",       order:["개선","동등","악화","N/A","미상"]},
  {key:"vtype",          label:"게재구분",      order:["ieee_journal","ieee_conference","arxiv","other"], display:function(v){return VTYPE_LABEL[v]||v;}},
  {key:"tags",           label:"재선별 태그",   order:["H","Q","R","L"], isArray:true}
];

// 테이블 컬럼 (key, 라벨, 숫자여부, 렌더러)
var COLUMNS = [
  {key:"year",           label:"연도",       num:true},
  {key:"title",          label:"제목",       num:false, cls:"title"},
  {key:"tags",           label:"태그",       num:false},
  {key:"portability",    label:"이식성",     num:false},
  {key:"recommend",      label:"추천도",     num:false},
  {key:"nand_relevance", label:"NAND",       num:false},
  {key:"target",         label:"대상",       num:false},
  {key:"soft_quant",     label:"연판정",     num:false},
  {key:"verification",   label:"검증",       num:false},
  {key:"rate_max",       label:"rate_max",   num:true},
  {key:"length_max",     label:"length_max", num:true}
];

// 상세 모달 필드 (전체)
var DETAIL_FIELDS = [
  {key:"id",label:"ID"},{key:"venue",label:"게재지"},{key:"vtype",label:"게재구분",display:function(v){return VTYPE_LABEL[v]||v;}},
  {key:"portability",label:"이식성"},{key:"nand_relevance",label:"NAND관련성"},{key:"target",label:"대상"},
  {key:"code_type",label:"부호종류"},
  {key:"code_rate",label:"부호rate(원문)"},{key:"rate_max",label:"rate_max"},
  {key:"code_length",label:"부호length(원문)"},{key:"length_max",label:"length_max(bit)"},
  {key:"soft_quant",label:"연판정"},{key:"hw_designed",label:"HW설계"},{key:"verification",label:"검증수준"},
  {key:"complexity",label:"복잡도"},{key:"parallelism",label:"병렬화"},{key:"throughput_gbps",label:"Throughput(Gbps)"},
  {key:"mem_routing",label:"메모리/라우팅"},{key:"correction_gain",label:"정정능력향상"},{key:"improve_region",label:"개선영역"},
  {key:"iter_reduction",label:"iteration감소"},{key:"latency",label:"latency"},{key:"recommend",label:"추천도"}
];

var GITHUB_BLOB = "https://github.com/yongsung-kil/ECC_papers/blob/master/";
var PAGE_SIZE = 100;

// ---------- 상태 ----------
var DATA = [];
var state = {
  q:"", enums:{}, rateMin:null, lengthMin:null, yearMin:null, yearMax:null,
  reselectUnion:false, sort:{key:"year", dir:"desc"}, page:1
};
ENUM_FIELDS.forEach(function(f){ state.enums[f.key] = []; });

// ---------- 유틸 ----------
function esc(s){
  if(s===null||s===undefined) return "";
  return String(s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});
}
function fmtNum(n){
  if(n===null||n===undefined||n==="") return "";
  return Number(n).toLocaleString("en-US");
}
function el(id){ return document.getElementById(id); }

// 재선별 축 판정 (raw 필드 + tags 병용 → reselect.json 없어도 동작)
function isH(p){ return p.soft_quant==="hard-1bit" || (p.tags&&p.tags.indexOf("H")>=0); }
function isR(p){ return (p.rate_max!==null && p.rate_max>=0.8) || (p.tags&&p.tags.indexOf("R")>=0); }
function isL(p){ return (p.length_max!==null && p.length_max>=16384) || (p.tags&&p.tags.indexOf("L")>=0); }
function isQ(p){ return p.tags&&p.tags.indexOf("Q")>=0; }

// ---------- 필터 ----------
function passes(p){
  // 텍스트
  if(state.q){
    var hay = ((p.title||"")+" "+(p.key_contribution||"")).toLowerCase();
    var toks = state.q.toLowerCase().split(/\s+/).filter(Boolean);
    for(var i=0;i<toks.length;i++){ if(hay.indexOf(toks[i])<0) return false; }
  }
  // enum
  for(var k=0;k<ENUM_FIELDS.length;k++){
    var f = ENUM_FIELDS[k], sel = state.enums[f.key];
    if(sel.length===0) continue;
    if(f.isArray){
      var hit=false, arr=p[f.key]||[];
      for(var a=0;a<sel.length;a++){ if(arr.indexOf(sel[a])>=0){hit=true;break;} }
      if(!hit) return false;
    }else{
      if(sel.indexOf(String(p[f.key]))<0) return false;
    }
  }
  // 숫자
  if(state.rateMin!==null){ if(p.rate_max===null || p.rate_max<state.rateMin) return false; }
  if(state.lengthMin!==null){ if(p.length_max===null || p.length_max<state.lengthMin) return false; }
  if(state.yearMin!==null){ if(p.year===null || p.year<state.yearMin) return false; }
  if(state.yearMax!==null){ if(p.year===null || p.year>state.yearMax) return false; }
  // 재선별 union
  if(state.reselectUnion){ if(!(isH(p)||isQ(p)||isR(p)||isL(p))) return false; }
  return true;
}

function compare(a,b,key,dir){
  var va=a[key], vb=b[key];
  var numeric = (key==="year"||key==="rate_max"||key==="length_max");
  var na = (va===null||va===undefined||va==="");
  var nb = (vb===null||vb===undefined||vb==="");
  if(na&&nb) return 0;
  if(na) return 1;   // null 항상 뒤로
  if(nb) return -1;
  var r;
  if(numeric){ r = va-vb; }
  else if(key==="tags"){ r = (va.length)-(vb.length); }
  else { r = String(va).localeCompare(String(vb),"ko"); }
  return dir==="asc"? r : -r;
}

function getFiltered(){
  var out = DATA.filter(passes);
  var s = state.sort;
  out.sort(function(a,b){
    var r = compare(a,b,s.key,s.dir);
    if(r!==0) return r;
    return a.year===b.year ? a.sid.localeCompare(b.sid) : (b.year||0)-(a.year||0);
  });
  return out;
}

// ---------- 렌더 ----------
function tagsHTML(arr){
  if(!arr||!arr.length) return '<span class="muted">-</span>';
  return arr.map(function(t){ return '<span class="tag '+esc(t)+'">'+esc(t)+'</span>'; }).join("");
}
function cellHTML(p,col){
  var v = p[col.key];
  if(col.key==="title"){
    return '<span class="t">'+esc(v)+'</span>';
  }
  if(col.key==="tags"){ return tagsHTML(v); }
  if(col.key==="recommend"||col.key==="portability"){
    return v? '<span class="pill">'+esc(v)+'</span>' : '<span class="muted">-</span>';
  }
  if(col.num){
    if(v===null||v===undefined) return '<span class="muted">-</span>';
    return col.key==="rate_max"? esc(v) : fmtNum(v);
  }
  return v? esc(v) : '<span class="muted">-</span>';
}

function renderHead(){
  var tr = el("theadRow"), html="";
  COLUMNS.forEach(function(c){
    var arrow = state.sort.key===c.key ? '<span class="arw">'+(state.sort.dir==="asc"?"▲":"▼")+'</span>' : "";
    html += '<th data-key="'+c.key+'" class="'+(c.num?"num":"")+'">'+esc(c.label)+arrow+'</th>';
  });
  tr.innerHTML = html;
  Array.prototype.forEach.call(tr.querySelectorAll("th"),function(th){
    th.addEventListener("click",function(){
      var key = th.getAttribute("data-key");
      if(state.sort.key===key){ state.sort.dir = state.sort.dir==="asc"?"desc":"asc"; }
      else{ state.sort.key=key; state.sort.dir = (key==="title"||key==="tags")?"asc":"desc"; }
      state.page=1; render();
    });
  });
}

var _filtered=[];
function render(){
  _filtered = getFiltered();
  var total = _filtered.length;
  var pages = Math.max(1, Math.ceil(total/PAGE_SIZE));
  if(state.page>pages) state.page=pages;
  var start=(state.page-1)*PAGE_SIZE;
  var slice=_filtered.slice(start,start+PAGE_SIZE);

  el("matchCount").textContent = total.toLocaleString("ko");
  el("shownCount").textContent = total.toLocaleString("ko");
  el("pageInfo").textContent = total? ("· "+(start+1)+"–"+(start+slice.length)+" 표시 (페이지 "+state.page+"/"+pages+")") : "";

  var tb = el("tbody"), rows="";
  slice.forEach(function(p){
    var tds = COLUMNS.map(function(c){
      return '<td class="'+(c.num?"num ":"")+(c.cls||"")+'">'+cellHTML(p,c)+'</td>';
    }).join("");
    rows += '<tr data-sid="'+esc(p.sid)+'">'+tds+'</tr>';
  });
  tb.innerHTML = rows;
  el("emptyMsg").style.display = total? "none":"block";

  Array.prototype.forEach.call(tb.querySelectorAll("tr"),function(tr){
    tr.addEventListener("click",function(){ openDetail(tr.getAttribute("data-sid")); });
  });

  renderHead();
  renderPager(pages);
  syncControls();
  writeHash();
}

function renderPager(pages){
  var p=el("pager");
  if(pages<=1){ p.innerHTML=""; return; }
  var cur=state.page;
  function b(lbl,pg,dis){ return '<button '+(dis?"disabled":"")+' data-pg="'+pg+'">'+lbl+'</button>'; }
  var html = b("« 처음",1,cur===1)+b("‹ 이전",cur-1,cur===1);
  html += '<span class="info">'+cur+' / '+pages+'</span>';
  html += b("다음 ›",cur+1,cur===pages)+b("끝 »",pages,cur===pages);
  p.innerHTML=html;
  Array.prototype.forEach.call(p.querySelectorAll("button"),function(btn){
    btn.addEventListener("click",function(){
      if(btn.disabled) return;
      state.page=parseInt(btn.getAttribute("data-pg"),10);
      window.scrollTo(0,0); render();
    });
  });
}

// ---------- 상세 모달 ----------
function dispVal(f,p){
  var v = p[f.key];
  if(f.display) v = f.display(v);
  if(v===null||v===undefined||v==="") return '<span class="muted">미상/없음</span>';
  return esc(v);
}
function openDetail(sid){
  var p=null;
  for(var i=0;i<DATA.length;i++){ if(DATA[i].sid===sid){p=DATA[i];break;} }
  if(!p) return;
  var kv = DETAIL_FIELDS.map(function(f){
    return '<dt>'+esc(f.label)+'</dt><dd>'+dispVal(f,p)+'</dd>';
  }).join("");
  var tagLine = (p.tags&&p.tags.length)? '<dt>재선별 태그</dt><dd>'+tagsHTML(p.tags)+'</dd>' : '';
  var qReason = p.q_reason? '<dt>Q 근거</dt><dd>'+esc(p.q_reason)+'</dd>' : '';
  var html =
    '<div class="mh">'+
      '<div><h2>'+esc(p.title)+'</h2>'+
        '<div class="sub">'+esc(p.year)+' · '+esc(p.venue||"")+' · '+esc(VTYPE_LABEL[p.vtype]||p.vtype)+' · '+esc(p.id)+'</div>'+
      '</div>'+
      '<button class="x" id="closeModal" aria-label="닫기">×</button>'+
    '</div>'+
    '<div class="mb">'+
      '<dl class="kv">'+kv+tagLine+qReason+'</dl>'+
      '<div class="section-t">핵심 기여</div>'+
      '<div class="freetext">'+ (p.key_contribution? esc(p.key_contribution) : '<span class="muted">기록 없음</span>') +'</div>'+
      '<div class="section-t">한계 · 주의</div>'+
      '<div class="freetext">'+ (p.caveat? esc(p.caveat) : '<span class="muted">기록 없음</span>') +'</div>'+
      '<a class="srclink" href="'+GITHUB_BLOB+esc(p.md)+'" target="_blank" rel="noopener">원본 분석 md 보기 ↗</a>'+
    '</div>';
  el("modal").innerHTML=html;
  el("overlay").classList.add("open");
  document.body.style.overflow="hidden";
  el("closeModal").addEventListener("click",closeDetail);
}
function closeDetail(){
  el("overlay").classList.remove("open");
  document.body.style.overflow="";
}
el("overlay").addEventListener("click",function(e){ if(e.target===el("overlay")) closeDetail(); });
document.addEventListener("keydown",function(e){ if(e.key==="Escape") closeDetail(); });

// ---------- 다중선택 UI ----------
function buildMultiselects(){
  var row=el("msRow"), counts={};
  ENUM_FIELDS.forEach(function(f){
    var c={};
    DATA.forEach(function(p){
      if(f.isArray){ (p[f.key]||[]).forEach(function(v){ c[v]=(c[v]||0)+1; }); }
      else { var v=String(p[f.key]); c[v]=(c[v]||0)+1; }
    });
    counts[f.key]=c;
    var vals = f.order.filter(function(v){return c[v];});
    Object.keys(c).forEach(function(v){ if(vals.indexOf(v)<0) vals.push(v); });
    var opts = vals.map(function(v){
      var disp = f.display? f.display(v):v;
      return '<label><input type="checkbox" value="'+esc(v)+'"><span>'+esc(disp)+'</span><span class="cnt">'+c[v]+'</span></label>';
    }).join("");
    var wrap=document.createElement("div");
    wrap.className="ms fld"; wrap.setAttribute("data-key",f.key);
    wrap.innerHTML =
      '<label>'+esc(f.label)+'</label>'+
      '<button type="button" data-btn>'+esc(f.label)+'</button>'+
      '<div class="panel">'+opts+'<button class="clr" type="button">선택 해제</button></div>';
    row.appendChild(wrap);

    var btn=wrap.querySelector("[data-btn]"), panel=wrap.querySelector(".panel");
    btn.addEventListener("click",function(e){
      e.stopPropagation();
      var isOpen=wrap.classList.contains("open");
      closeAllMs();
      if(!isOpen) wrap.classList.add("open");
    });
    panel.addEventListener("click",function(e){ e.stopPropagation(); });
    Array.prototype.forEach.call(panel.querySelectorAll('input[type=checkbox]'),function(cb){
      cb.addEventListener("change",function(){
        var sel=[];
        Array.prototype.forEach.call(panel.querySelectorAll('input:checked'),function(x){ sel.push(x.value); });
        state.enums[f.key]=sel; state.page=1; render();
      });
    });
    wrap.querySelector(".clr").addEventListener("click",function(){
      Array.prototype.forEach.call(panel.querySelectorAll('input:checked'),function(x){ x.checked=false; });
      state.enums[f.key]=[]; state.page=1; render();
    });
  });
}
function closeAllMs(){
  Array.prototype.forEach.call(document.querySelectorAll(".ms.open"),function(m){ m.classList.remove("open"); });
}
document.addEventListener("click",closeAllMs);

// 컨트롤 상태를 state에 맞춤 (프리셋/해시 복원 후)
function syncControls(){
  el("search").value = state.q;
  el("rateMin").value = state.rateMin===null?"":state.rateMin;
  el("lengthMin").value = state.lengthMin===null?"":state.lengthMin;
  el("yearMin").value = state.yearMin===null?"":state.yearMin;
  el("yearMax").value = state.yearMax===null?"":state.yearMax;
  ENUM_FIELDS.forEach(function(f){
    var wrap=document.querySelector('.ms[data-key="'+f.key+'"]');
    if(!wrap) return;
    var sel=state.enums[f.key];
    var btn=wrap.querySelector("[data-btn]");
    btn.textContent = sel.length? (f.label+" ("+sel.length+")") : f.label;
    btn.classList.toggle("active", sel.length>0);
    Array.prototype.forEach.call(wrap.querySelectorAll('input[type=checkbox]'),function(cb){
      cb.checked = sel.indexOf(cb.value)>=0;
    });
  });
}

// ---------- 입력 바인딩 ----------
function numOrNull(v){ v=v.trim(); if(v==="") return null; var n=Number(v); return isNaN(n)?null:n; }
el("search").addEventListener("input",function(){ state.q=this.value; state.page=1; render(); });
el("rateMin").addEventListener("input",function(){ state.rateMin=numOrNull(this.value); state.page=1; render(); });
el("lengthMin").addEventListener("input",function(){ state.lengthMin=numOrNull(this.value); state.page=1; render(); });
el("yearMin").addEventListener("input",function(){ state.yearMin=numOrNull(this.value); state.page=1; render(); });
el("yearMax").addEventListener("input",function(){ state.yearMax=numOrNull(this.value); state.page=1; render(); });

// ---------- 프리셋 ----------
function clearFilters(){
  state.q=""; state.rateMin=null; state.lengthMin=null; state.yearMin=null; state.yearMax=null;
  state.reselectUnion=false;
  ENUM_FIELDS.forEach(function(f){ state.enums[f.key]=[]; });
}
el("presets").addEventListener("click",function(e){
  var btn=e.target.closest("[data-preset]"); if(!btn) return;
  var p=btn.getAttribute("data-preset");
  clearFilters();
  if(p==="reselect"){ state.reselectUnion=true; }
  else if(p==="H"){ state.enums.soft_quant=["hard-1bit"]; }
  else if(p==="Q"){ state.enums.tags=["Q"]; }
  else if(p==="R"){ state.rateMin=0.8; }
  else if(p==="L"){ state.lengthMin=16384; }
  else if(p==="rec"){ state.enums.recommend=["상"]; }
  // clear → 아무것도 안 함
  state.page=1; render();
});

// ---------- URL 해시 (필터 공유) ----------
var _hashLock=false;
function writeHash(){
  if(_hashLock) return;
  var m={};
  if(state.q) m.q=state.q;
  if(state.rateMin!==null) m.rm=state.rateMin;
  if(state.lengthMin!==null) m.lm=state.lengthMin;
  if(state.yearMin!==null) m.y0=state.yearMin;
  if(state.yearMax!==null) m.y1=state.yearMax;
  if(state.reselectUnion) m.ru=1;
  var ens={};
  ENUM_FIELDS.forEach(function(f){ if(state.enums[f.key].length) ens[f.key]=state.enums[f.key]; });
  if(Object.keys(ens).length) m.e=ens;
  if(state.sort.key!=="year"||state.sort.dir!=="desc") m.s=[state.sort.key,state.sort.dir];
  if(state.page>1) m.p=state.page;
  var str = Object.keys(m).length? encodeURIComponent(JSON.stringify(m)) : "";
  var target = str? "#"+str : "#";
  if(location.hash!==target){ history.replaceState(null,"",target); }
}
function readHash(){
  var h=location.hash.replace(/^#/,"");
  if(!h) return;
  try{
    var m=JSON.parse(decodeURIComponent(h));
    if(m.q) state.q=m.q;
    if(m.rm!==undefined) state.rateMin=m.rm;
    if(m.lm!==undefined) state.lengthMin=m.lm;
    if(m.y0!==undefined) state.yearMin=m.y0;
    if(m.y1!==undefined) state.yearMax=m.y1;
    if(m.ru) state.reselectUnion=true;
    if(m.e){ ENUM_FIELDS.forEach(function(f){ if(m.e[f.key]) state.enums[f.key]=m.e[f.key]; }); }
    if(m.s){ state.sort={key:m.s[0],dir:m.s[1]}; }
    if(m.p) state.page=m.p;
  }catch(err){ /* 무시 */ }
}

// ---------- 초기화 ----------
fetch("papers.json").then(function(r){ return r.json(); }).then(function(d){
  DATA = d.papers;
  el("totalCount").textContent = (d.total||DATA.length).toLocaleString("ko");
  el("genDate").textContent = d.generated||"-";
  buildMultiselects();
  readHash();
  render();
}).catch(function(err){
  el("emptyMsg").style.display="block";
  el("emptyMsg").textContent = "papers.json 로드 실패: "+err;
});
</script>
