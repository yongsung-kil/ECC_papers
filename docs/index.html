<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LDPC 논문 분석 탐색기 (stage3)</title>
<style>
  :root{
    --canvas:#000000; --surface-soft:#0d0d0d; --surface-card:#1a1a1a; --surface-elevated:#262626;
    --hairline:#3c3c3c; --body:#bbbbbb; --body-strong:#e6e6e6; --muted:#7e7e7e; --ink:#ffffff;
    --m-blue-light:#0066b1; --m-blue-dark:#1c69d4; --m-red:#e22718;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Malgun Gothic","Apple SD Gothic Neo",sans-serif;
    background:var(--canvas); color:var(--body); font-size:14px; line-height:1.5; font-weight:400;
    -webkit-font-smoothing:antialiased;
  }
  a{color:var(--ink); text-decoration:none;}
  a:hover{text-decoration:underline;}

  /* header + M tricolor stripe */
  header{background:var(--canvas); padding:28px 32px 22px; border-bottom:1px solid var(--hairline);}
  .head-inner{max-width:1500px; margin:0 auto;}
  header h1{margin:0; font-size:24px; font-weight:700; letter-spacing:1px; color:var(--ink); text-transform:uppercase;}
  .ttl{
    background:linear-gradient(100deg,#4d9fff 0%,#7b7fe6 52%,#f0503f 100%);
    -webkit-background-clip:text; background-clip:text; color:#4d9fff; -webkit-text-fill-color:transparent;
  }
  .tag-stage{display:inline-block; vertical-align:middle; margin-left:10px; font-size:12px; font-weight:700; letter-spacing:1.5px; padding:3px 9px; border:1px solid var(--hairline); color:var(--body); text-transform:uppercase;}
  header .meta{margin-top:9px; color:var(--muted); font-size:12.5px; font-weight:400; letter-spacing:.3px;}
  header .meta a{font-weight:700; letter-spacing:.5px; text-transform:uppercase; font-size:12px;}
  .mstripe{height:4px; border:0; background:linear-gradient(90deg, var(--m-blue-light) 0 33.33%, var(--m-blue-dark) 33.33% 66.66%, var(--m-red) 66.66% 100%);}

  main{padding:32px; max-width:1500px; margin:0 auto;}

  /* filter panel */
  .filters{background:var(--surface-soft); border:1px solid var(--hairline); padding:16px 18px; margin-bottom:24px;}

  /* preset category-tabs */
  .presets{display:flex; flex-wrap:wrap; gap:20px; padding:0 0 14px; margin-bottom:6px; border-bottom:1px solid var(--hairline);}
  .btn{
    font:inherit; font-size:13px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; cursor:pointer;
    padding:6px 0 8px; border:0; border-bottom:2px solid transparent; background:transparent; color:var(--body); border-radius:0;
  }
  .btn:hover,.btn:focus{color:var(--ink); border-bottom-color:var(--ink); outline:none;}
  .btn.reset{color:var(--muted);}
  .btn.reset:hover,.btn.reset:focus{color:var(--ink); border-bottom-color:var(--ink);}

  /* grouped filter rows */
  .grow{display:flex; align-items:flex-start; gap:16px; padding:11px 0; border-top:1px solid var(--hairline);}
  .groups .grow:first-child{border-top:0;}
  .grow.g-search{--grp:var(--body);}
  .grow.g-paper{--grp:#4d9fff;}
  .grow.g-judge{--grp:#f4b400;}
  .grow.g-decoder{--grp:#b794f6;}
  .grow.g-hw{--grp:#2dd4bf;}
  .grow.g-num{--grp:#fb923c;}
  .glabel{flex:0 0 96px; font-size:12px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; color:var(--grp,var(--body)); padding-top:11px;}
  .gfields{display:flex; flex-wrap:wrap; gap:9px 13px; align-items:flex-end; flex:1 1 auto;}

  .fld{display:flex; flex-direction:column; gap:4px;}
  .fld label{font-size:12px; color:var(--muted); font-weight:700; letter-spacing:.3px; text-transform:uppercase;}
  .yrwrap{display:flex; gap:5px; align-items:center;}
  .yrwrap .sep{color:var(--muted);}

  input[type=text],input[type=number]{
    font:inherit; font-weight:400; font-size:14px; height:36px; padding:0 10px; border:1px solid var(--hairline);
    background:var(--surface-card); color:var(--ink); border-radius:0; min-width:0;
  }
  input::placeholder{color:var(--muted); opacity:1;}
  input[type=text]:focus,input[type=number]:focus{outline:none; border-color:var(--ink);}
  input[type=number]{width:100px;}
  .yr{width:80px;}

  /* keyword chip search */
  .chipbox{display:flex; flex-wrap:wrap; gap:6px; align-items:center;}
  .chips{display:contents;}
  .chip{display:inline-flex; align-items:center; gap:5px; height:34px; padding:0 6px 0 12px; border:1px solid var(--hairline); color:var(--ink); font-size:13.5px; font-weight:400; letter-spacing:.3px; border-radius:0;}
  .chipx{font:inherit; font-size:17px; line-height:1; cursor:pointer; background:transparent; border:0; color:var(--muted); padding:0 3px; border-radius:0;}
  .chipx:hover{color:var(--ink);}
  #search{height:36px; width:220px; flex:0 0 auto; min-width:160px; font-size:14px;}

  /* multiselect dropdown */
  .ms{position:relative;}
  .ms>label{display:none;}
  .ms>button{
    font:inherit; font-weight:700; font-size:13.5px; letter-spacing:.4px; text-transform:uppercase; cursor:pointer;
    height:36px; padding:0 30px 0 12px; border:1px solid var(--hairline); background:var(--surface-card);
    color:var(--grp,var(--body)); text-align:left; white-space:nowrap; min-width:118px; border-radius:0; position:relative;
  }
  .ms>button::after{content:"▾"; position:absolute; right:11px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:10px;}
  .ms>button.active{border-color:var(--grp,var(--ink)); color:var(--grp,var(--ink));}
  .ms .panel{
    position:absolute; z-index:40; top:calc(100% + 4px); left:0; min-width:210px; max-height:320px; overflow:auto;
    background:var(--surface-card); border:1px solid var(--hairline); border-radius:0; padding:6px; display:none;
  }
  .ms.open .panel{display:block;}
  .ms .panel label{display:flex; align-items:center; gap:8px; padding:7px 9px; border-radius:0; cursor:pointer; font-size:14px; font-weight:400; letter-spacing:0; text-transform:none; white-space:nowrap; color:var(--body);}
  .ms .panel label:hover{background:var(--surface-elevated); color:var(--ink);}
  .ms .panel label.zero{color:var(--muted);}
  .ms .panel label.zero .cnt{color:var(--muted);}
  .ms .panel .cnt{margin-left:auto; color:var(--muted); font-size:11.5px; font-variant-numeric:tabular-nums;}
  .ms .panel .clr{width:100%; margin-top:6px; font:inherit; font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; cursor:pointer; background:transparent; border:1px solid var(--hairline); border-radius:0; color:var(--muted); padding:7px;}
  .ms .panel .clr:hover{border-color:var(--ink); color:var(--ink);}

  /* spec-cell stat grid */
  .specgrid{display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:1px; background:var(--hairline); border:1px solid var(--hairline); margin-bottom:24px;}
  .spec-cell{background:var(--surface-soft); padding:16px; display:flex; flex-direction:column; gap:7px; color:var(--body);}
  .spec-cell .sv{font-size:26px; font-weight:700; color:var(--ink); line-height:1; font-variant-numeric:tabular-nums;}
  .spec-cell .sl{font-size:12px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; color:var(--muted);}

  .countbar{display:flex; align-items:baseline; gap:14px; flex-wrap:wrap; margin:0 0 14px; color:var(--muted); font-size:12.5px; font-weight:400; letter-spacing:.3px;}
  .countbar b{color:var(--ink); font-size:15px; font-weight:700; font-variant-numeric:tabular-nums;}

  /* table */
  .tablewrap{overflow-x:auto; border:1px solid var(--hairline); background:var(--canvas);}
  table{border-collapse:collapse; width:100%; min-width:920px; font-size:14px;}
  thead th{
    position:sticky; top:0; background:var(--surface-card); text-align:left; padding:12px;
    font-size:12px; font-weight:700; letter-spacing:.3px; text-transform:uppercase;
    border-bottom:1px solid var(--hairline); cursor:pointer; user-select:none; white-space:nowrap; color:var(--body-strong);
  }
  thead th .arw{color:var(--ink); font-size:10px; margin-left:4px;}
  thead th.num{text-align:right;}
  tbody td{padding:12px; border-bottom:1px solid var(--hairline); vertical-align:top; font-weight:400; line-height:1.5; color:var(--body);}
  tbody td.num{text-align:right; font-variant-numeric:tabular-nums; white-space:nowrap;}
  tbody tr{cursor:pointer;}
  tbody tr:hover{background:var(--surface-soft);}
  tbody tr:last-child td{border-bottom:0;}
  td.title{max-width:460px;}
  td.title .t{color:#4d9fff; font-weight:700; font-size:15px;}
  tbody tr:hover td.title .t{color:#82b8ff;}
  .pill{display:inline-block; font-weight:700; letter-spacing:.3px; color:var(--body-strong);}

  /* enum 값 색상 (같은 값 = 같은 색, 검정 캔버스 대비 보정) */
  .c-green{color:#2eb85c; font-weight:700;} .c-amber{color:#f4b400; font-weight:700;} .c-red{color:#f0503f; font-weight:700;}
  .c-blue{color:#4d9fff; font-weight:700;} .c-teal{color:#2dd4bf; font-weight:700;} .c-violet{color:#b794f6; font-weight:700;}
  .c-orange{color:#fb923c; font-weight:700;} .c-electric{color:#38bdf8; font-weight:700;}
  .c-muted{color:var(--muted);} .c-body{color:var(--body-strong);}
  .muted{color:var(--muted);}

  /* pagination — circular icon buttons */
  .pager{display:flex; align-items:center; justify-content:center; gap:12px; margin:24px 0 0; flex-wrap:wrap;}
  .pager button{
    font:inherit; font-size:17px; line-height:1; cursor:pointer; width:48px; height:48px; padding:0;
    border:1px solid var(--hairline); border-radius:50%; background:var(--surface-card); color:var(--ink);
    display:inline-flex; align-items:center; justify-content:center;
  }
  .pager button:hover:not(:disabled){border-color:var(--ink);}
  .pager button:disabled{opacity:.3; cursor:default;}
  .pager .info{color:var(--body); font-size:12px; font-weight:700; letter-spacing:1px; min-width:74px; text-align:center;}

  /* detail modal */
  .overlay{position:fixed; inset:0; background:rgba(0,0,0,.72); display:none; align-items:flex-start; justify-content:center; padding:48px 16px; z-index:100; overflow:auto;}
  .overlay.open{display:flex;}
  .modal{background:var(--surface-card); border:1px solid var(--hairline); border-radius:0; max-width:820px; width:100%;}
  .modal .mh{display:flex; justify-content:space-between; gap:16px; align-items:flex-start; padding:20px 22px 16px; border-bottom:1px solid var(--hairline); position:sticky; top:0; background:var(--surface-card);}
  .modal .mh h2{margin:0; font-size:20px; font-weight:700; line-height:1.35; color:#4d9fff; letter-spacing:.3px;}
  .modal .mh .sub{color:var(--muted); font-size:12.5px; font-weight:400; letter-spacing:.3px; margin-top:6px;}
  .modal .x{font:inherit; font-size:18px; line-height:1; cursor:pointer; border:1px solid var(--hairline); background:var(--surface-card); color:var(--ink); border-radius:50%; width:36px; height:36px; flex:0 0 auto; display:inline-flex; align-items:center; justify-content:center; padding:0;}
  .modal .x:hover{border-color:var(--ink);}
  .modal .mb{padding:20px 22px 24px;}
  .kv{display:grid; grid-template-columns:160px 1fr; gap:8px 16px; align-items:start;}
  .kv dt{color:var(--muted); font-size:12px; font-weight:700; letter-spacing:.3px; text-transform:uppercase; padding-top:2px;}
  .kv dd{margin:0; word-break:break-word; font-weight:400; color:var(--body-strong);}
  .section-t{font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.3px; margin:22px 0 8px;}
  .freetext{background:var(--surface-soft); border:1px solid var(--hairline); border-radius:0; padding:12px 14px; line-height:1.6; font-weight:400; font-size:14px; color:var(--body-strong);}
  .srclink{display:inline-block; margin-top:18px; padding:12px 22px; background:transparent; color:var(--ink); border:1px solid var(--ink); border-radius:0; text-decoration:none; font-weight:700; font-size:13px; letter-spacing:.5px; text-transform:uppercase;}
  .srclink:hover{background:var(--ink); color:var(--canvas); text-decoration:none;}
  .empty{padding:48px; text-align:center; color:var(--muted); font-weight:400; letter-spacing:.5px;}

  @media (max-width:640px){
    header{padding:20px 16px 16px;}
    main{padding:20px 12px 48px;}
    .grow{flex-direction:column; gap:8px;}
    .glabel{padding-top:0;}
    .kv{grid-template-columns:1fr;}
    .kv dt{padding-top:10px;}
  }
</style>
</head>
<body>
<header>
  <div class="head-inner">
    <h1><span class="ttl">LDPC 논문 분석 탐색기</span> <span class="tag-stage">stage3</span></h1>
    <div class="meta">원본 데이터 · <a href="https://github.com/yongsung-kil/ECC_papers" target="_blank" rel="noopener">ECC_papers</a></div>
  </div>
</header>
<div class="mstripe" aria-hidden="true"></div>

<main>
  <div class="filters" id="filters">
    <div class="presets" id="presets">
      <button class="btn" data-preset="rec">추천도 상</button>
      <button class="btn reset" data-preset="clear">필터 초기화</button>
    </div>

    <div class="groups">
      <div class="grow g-search">
        <div class="glabel">검색</div>
        <div class="gfields">
          <div class="fld" style="flex:1 1 auto;">
            <label>제목 · 핵심기여 (키워드 AND)</label>
            <div class="chipbox" id="chipbox">
              <span class="chips" id="chips"></span>
              <input type="text" id="search" placeholder="키워드 입력 후 Enter">
            </div>
          </div>
        </div>
      </div>

      <div class="grow g-paper">
        <div class="glabel">논문 정보</div>
        <div class="gfields" id="grpPaper">
          <div class="fld">
            <label>연도 (min ~ max)</label>
            <div class="yrwrap">
              <input type="number" id="yearMin" class="yr" placeholder="1991">
              <span class="sep">~</span>
              <input type="number" id="yearMax" class="yr" placeholder="2026">
            </div>
          </div>
        </div>
      </div>

      <div class="grow g-judge">
        <div class="glabel">판정</div>
        <div class="gfields" id="grpJudge"></div>
      </div>

      <div class="grow g-decoder">
        <div class="glabel">디코더 성능</div>
        <div class="gfields" id="grpDecoder"></div>
      </div>

      <div class="grow g-hw">
        <div class="glabel">하드웨어</div>
        <div class="gfields" id="grpHw"></div>
      </div>

      <div class="grow g-num">
        <div class="glabel">수치</div>
        <div class="gfields" id="grpNum">
          <div class="fld">
            <label>rate_max ≥</label>
            <input type="number" id="rateMin" step="0.01" min="0" max="1" placeholder="0.0">
          </div>
          <div class="fld">
            <label>length_max ≥ (bit)</label>
            <input type="number" id="lengthMin" step="1" min="0" placeholder="0">
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="specgrid" id="specgrid">
    <div class="spec-cell"><div class="sv" id="shownCount">0</div><div class="sl">표시</div></div>
    <div class="spec-cell"><div class="sv" id="totalCount">0</div><div class="sl">전체</div></div>
  </div>

  <div class="countbar">
    <span><b id="matchCount">0</b>편 일치</span>
    <span id="pageInfo" class="muted"></span>
  </div>

  <div class="tablewrap">
    <table>
      <thead><tr id="theadRow"></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div id="emptyMsg" class="empty" style="display:none;">조건에 맞는 논문이 없습니다.</div>

  <div class="pager" id="pager"></div>
</main>

<div class="overlay" id="overlay">
  <div class="modal" id="modal" role="dialog" aria-modal="true"></div>
</div>

<script>
"use strict";

// ---------- 필드 메타 ----------
var VTYPE_LABEL = {ieee_journal:"IEEE Journal", ieee_conference:"IEEE Conference", arxiv:"arXiv", other:"기타"};

// 다중선택 enum 필터 (라벨, key, 선호 정렬 순서) — 필터 그룹 순서대로 정렬
var ENUM_FIELDS = [
  // 판정
  {key:"portability",    label:"이식성",        order:["상","중","하","미상"]},
  {key:"recommend",      label:"추천도",        order:["상","중","하","미상"]},
  {key:"nand_relevance", label:"NAND관련성",    order:["직접","간접","낮음","미상"]},
  {key:"target",         label:"대상",          order:["decoder","encoder","both","code-design","other","미상"]},
  // 디코더 성능
  {key:"soft_quant",     label:"연판정",        order:["hard-1bit","soft-2~3bit","soft-4bit+","무관","N/A","미상"]},
  {key:"dq",             label:"디코더양자화",  order:["핵심","있음","없음","미상"]},
  {key:"correction_gain",label:"정정능력향상",  order:["O","X","N/A","미상"]},
  {key:"improve_region", label:"개선영역",      order:["waterfall","error-floor","both","N/A","미상"]},
  {key:"iter_reduction", label:"iteration감소", order:["O","부분","X","N/A","미상"]},
  {key:"latency",        label:"latency",       order:["개선","동등","악화","N/A","미상"]},
  // 하드웨어
  {key:"hw_designed",    label:"HW설계",        order:["O","X","미상"]},
  {key:"verification",   label:"검증수준",      order:["이론","시뮬","FPGA","ASIC합성","실측","미상"]},
  {key:"parallelism",    label:"병렬화",        order:["없음","부분","완전병렬","N/A","미상"]},
  // 논문 정보
  {key:"vtype",          label:"게재구분",      order:["ieee_journal","ieee_conference","arxiv","other"], display:function(v){return VTYPE_LABEL[v]||v;}},
  {key:"code_type",      label:"부호종류",      order:["QC-LDPC","SC-LDPC","regular","irregular","protograph","기타","미상"]}
];

// 다중선택 필터 → 화면 그룹 컨테이너 매핑
var MS_GROUP = {
  portability:"grpJudge", recommend:"grpJudge", nand_relevance:"grpJudge", target:"grpJudge",
  soft_quant:"grpDecoder", dq:"grpDecoder", correction_gain:"grpDecoder", improve_region:"grpDecoder", iter_reduction:"grpDecoder", latency:"grpDecoder",
  hw_designed:"grpHw", verification:"grpHw", parallelism:"grpHw",
  vtype:"grpPaper", code_type:"grpPaper"
};

// enum 값 → 색상 클래스 (같은 값은 어디서든 동일 색; 검정 캔버스 대비 보정)
var VALUE_COLOR = {
  "O":"c-green","상":"c-green","개선":"c-green","완전병렬":"c-green","실측":"c-green","ieee_journal":"c-green","regular":"c-green","있음":"c-green",
  "X":"c-red","악화":"c-red",
  "중":"c-amber","부분":"c-amber","irregular":"c-amber","시뮬":"c-amber","arxiv":"c-amber",
  "decoder":"c-blue","QC-LDPC":"c-blue","FPGA":"c-blue","FPGA합성":"c-blue","waterfall":"c-blue","ieee_conference":"c-blue","soft-2~3bit":"c-blue",
  "hard-1bit":"c-teal","both":"c-teal","code-design":"c-teal","SC-LDPC":"c-teal",
  "soft-4bit+":"c-violet","protograph":"c-violet","error-floor":"c-violet","ASIC합성":"c-violet","핵심":"c-violet",
  "encoder":"c-orange",
  "직접":"c-electric",
  "간접":"c-body","동등":"c-body","언급":"c-body",
  "하":"c-muted","낮음":"c-muted","없음":"c-muted","이론":"c-muted","무관":"c-muted","N/A":"c-muted","미상":"c-muted","other":"c-muted","기타":"c-muted"
};
var COLOR_FIELDS = {portability:1,recommend:1,nand_relevance:1,target:1,soft_quant:1,dq:1,correction_gain:1,improve_region:1,iter_reduction:1,latency:1,hw_designed:1,verification:1,parallelism:1,vtype:1,code_type:1};
function valCls(key,v){
  if(!COLOR_FIELDS[key]) return "";
  return VALUE_COLOR[String(v)] || "";
}

// 테이블 컬럼 (key, 라벨, 숫자여부, 렌더러)
var COLUMNS = [
  {key:"year",           label:"연도",       num:true},
  {key:"title",          label:"제목",       num:false, cls:"title"},
  {key:"portability",    label:"이식성",     num:false},
  {key:"recommend",      label:"추천도",     num:false},
  {key:"nand_relevance", label:"NAND",       num:false},
  {key:"target",         label:"대상",       num:false},
  {key:"soft_quant",     label:"연판정",     num:false},
  {key:"verification",   label:"검증",       num:false},
  {key:"rate_max",       label:"rate_max",   num:true},
  {key:"length_max",     label:"length_max", num:true}
];

// 상세 모달 필드 (전체)
var DETAIL_FIELDS = [
  {key:"id",label:"ID"},{key:"venue",label:"게재지"},{key:"vtype",label:"게재구분",display:function(v){return VTYPE_LABEL[v]||v;}},
  {key:"portability",label:"이식성"},{key:"nand_relevance",label:"NAND관련성"},{key:"target",label:"대상"},
  {key:"code_type",label:"부호종류"},
  {key:"code_rate",label:"부호rate(원문)"},{key:"rate_max",label:"rate_max"},
  {key:"code_length",label:"부호length(원문)"},{key:"length_max",label:"length_max(bit)"},
  {key:"soft_quant",label:"연판정"},{key:"dq",label:"디코더양자화"},{key:"hw_designed",label:"HW설계"},{key:"verification",label:"검증수준"},
  {key:"complexity",label:"복잡도"},{key:"parallelism",label:"병렬화"},{key:"throughput_gbps",label:"Throughput(Gbps)"},
  {key:"mem_routing",label:"메모리/라우팅"},{key:"correction_gain",label:"정정능력향상"},{key:"improve_region",label:"개선영역"},
  {key:"iter_reduction",label:"iteration감소"},{key:"latency",label:"latency"},{key:"recommend",label:"추천도"}
];

var GITHUB_BLOB = "https://github.com/yongsung-kil/ECC_papers/blob/master/";
var PAGE_SIZE = 100;

// ---------- 상태 ----------
var DATA = [];
var state = {
  q:"", chips:[], enums:{}, rateMin:null, lengthMin:null, yearMin:null, yearMax:null,
  sort:{key:"year", dir:"desc"}, page:1
};
ENUM_FIELDS.forEach(function(f){ state.enums[f.key] = []; });

// ---------- 유틸 ----------
function esc(s){
  if(s===null||s===undefined) return "";
  return String(s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});
}
function fmtNum(n){
  if(n===null||n===undefined||n==="") return "";
  return Number(n).toLocaleString("en-US");
}
function el(id){ return document.getElementById(id); }

// ---------- 필터 ----------
var _toks = [];   // 현재 키워드 토큰 (render 시작 시 갱신)
function passes(p, exceptKey){
  // 텍스트 (칩 키워드 AND)
  if(_toks.length){
    var hay = p._hay||"";
    for(var i=0;i<_toks.length;i++){ if(hay.indexOf(_toks[i])<0) return false; }
  }
  // enum (파세트 카운트 시 자기 필드는 제외)
  for(var k=0;k<ENUM_FIELDS.length;k++){
    var f = ENUM_FIELDS[k];
    if(exceptKey && f.key===exceptKey) continue;
    var sel = state.enums[f.key];
    if(sel.length===0) continue;
    if(f.isArray){
      var hit=false, arr=p[f.key]||[];
      for(var a=0;a<sel.length;a++){ if(arr.indexOf(sel[a])>=0){hit=true;break;} }
      if(!hit) return false;
    }else{
      if(sel.indexOf(String(p[f.key]))<0) return false;
    }
  }
  // 숫자
  if(state.rateMin!==null){ if(p.rate_max===null || p.rate_max<state.rateMin) return false; }
  if(state.lengthMin!==null){ if(p.length_max===null || p.length_max<state.lengthMin) return false; }
  if(state.yearMin!==null){ if(p.year===null || p.year<state.yearMin) return false; }
  if(state.yearMax!==null){ if(p.year===null || p.year>state.yearMax) return false; }
  return true;
}

function compare(a,b,key,dir){
  var va=a[key], vb=b[key];
  var numeric = (key==="year"||key==="rate_max"||key==="length_max");
  var na = (va===null||va===undefined||va==="");
  var nb = (vb===null||vb===undefined||vb==="");
  if(na&&nb) return 0;
  if(na) return 1;   // null 항상 뒤로
  if(nb) return -1;
  var r;
  if(numeric){ r = va-vb; }
  else { r = String(va).localeCompare(String(vb),"ko"); }
  return dir==="asc"? r : -r;
}

function getFiltered(){
  var out = DATA.filter(function(p){ return passes(p); });
  var s = state.sort;
  out.sort(function(a,b){
    var r = compare(a,b,s.key,s.dir);
    if(r!==0) return r;
    return a.year===b.year ? a.sid.localeCompare(b.sid) : (b.year||0)-(a.year||0);
  });
  return out;
}

// ---------- 렌더 ----------
function cellHTML(p,col){
  var v = p[col.key];
  if(col.key==="title"){
    return '<span class="t">'+esc(v)+'</span>';
  }
  if(col.key==="recommend"||col.key==="portability"){
    return v? '<span class="pill '+valCls(col.key,v)+'">'+esc(v)+'</span>' : '<span class="muted">-</span>';
  }
  if(col.num){
    if(v===null||v===undefined) return '<span class="muted">-</span>';
    return col.key==="rate_max"? esc(v) : fmtNum(v);
  }
  if(v===null||v===undefined||v==="") return '<span class="muted">-</span>';
  var cc = valCls(col.key,v);
  return cc? '<span class="'+cc+'">'+esc(v)+'</span>' : esc(v);
}

function renderHead(){
  var tr = el("theadRow"), html="";
  COLUMNS.forEach(function(c){
    var arrow = state.sort.key===c.key ? '<span class="arw">'+(state.sort.dir==="asc"?"▲":"▼")+'</span>' : "";
    html += '<th data-key="'+c.key+'" class="'+(c.num?"num":"")+'">'+esc(c.label)+arrow+'</th>';
  });
  tr.innerHTML = html;
  Array.prototype.forEach.call(tr.querySelectorAll("th"),function(th){
    th.addEventListener("click",function(){
      var key = th.getAttribute("data-key");
      if(state.sort.key===key){ state.sort.dir = state.sort.dir==="asc"?"desc":"asc"; }
      else{ state.sort.key=key; state.sort.dir = (key==="title")?"asc":"desc"; }
      state.page=1; render();
    });
  });
}

var _filtered=[];
function render(){
  _toks = state.q ? state.q.toLowerCase().split(/\s+/).filter(Boolean) : [];
  _filtered = getFiltered();
  var total = _filtered.length;
  var pages = Math.max(1, Math.ceil(total/PAGE_SIZE));
  if(state.page>pages) state.page=pages;
  var start=(state.page-1)*PAGE_SIZE;
  var slice=_filtered.slice(start,start+PAGE_SIZE);

  el("matchCount").textContent = total.toLocaleString("ko");
  el("shownCount").textContent = total.toLocaleString("ko");
  el("pageInfo").textContent = total? ("· "+(start+1)+"–"+(start+slice.length)+" 표시 (페이지 "+state.page+"/"+pages+")") : "";

  var tb = el("tbody"), rows="";
  slice.forEach(function(p){
    var tds = COLUMNS.map(function(c){
      return '<td class="'+(c.num?"num ":"")+(c.cls||"")+'">'+cellHTML(p,c)+'</td>';
    }).join("");
    rows += '<tr data-sid="'+esc(p.sid)+'">'+tds+'</tr>';
  });
  tb.innerHTML = rows;
  el("emptyMsg").style.display = total? "none":"block";

  Array.prototype.forEach.call(tb.querySelectorAll("tr"),function(tr){
    tr.addEventListener("click",function(){ openDetail(tr.getAttribute("data-sid")); });
  });

  renderHead();
  renderPager(pages);
  syncControls();
  updateFacetCounts();
  writeHash();
}

function renderPager(pages){
  var p=el("pager");
  if(pages<=1){ p.innerHTML=""; return; }
  var cur=state.page;
  function b(lbl,pg,dis,ttl){ return '<button '+(dis?"disabled":"")+' data-pg="'+pg+'" title="'+ttl+'" aria-label="'+ttl+'">'+lbl+'</button>'; }
  var html = b("«",1,cur===1,"처음")+b("‹",cur-1,cur===1,"이전");
  html += '<span class="info">'+cur+' / '+pages+'</span>';
  html += b("›",cur+1,cur===pages,"다음")+b("»",pages,cur===pages,"끝");
  p.innerHTML=html;
  Array.prototype.forEach.call(p.querySelectorAll("button"),function(btn){
    btn.addEventListener("click",function(){
      if(btn.disabled) return;
      state.page=parseInt(btn.getAttribute("data-pg"),10);
      window.scrollTo(0,0); render();
    });
  });
}

// ---------- 상세 모달 ----------
function dispVal(f,p){
  var raw = p[f.key];
  var v = f.display ? f.display(raw) : raw;
  if(v===null||v===undefined||v==="") return '<span class="muted">미상/없음</span>';
  var cls = valCls(f.key, raw);
  return cls? '<span class="'+cls+'">'+esc(v)+'</span>' : esc(v);
}
function openDetail(sid){
  var p=null;
  for(var i=0;i<DATA.length;i++){ if(DATA[i].sid===sid){p=DATA[i];break;} }
  if(!p) return;
  var kv = DETAIL_FIELDS.map(function(f){
    return '<dt>'+esc(f.label)+'</dt><dd>'+dispVal(f,p)+'</dd>';
  }).join("");
  var qReason = p.dq_reason? '<dt>디코더양자화 근거</dt><dd>'+esc(p.dq_reason)+'</dd>' : '';
  var html =
    '<div class="mh">'+
      '<div><h2>'+esc(p.title)+'</h2>'+
        '<div class="sub">'+esc(p.year)+' · '+esc(p.venue||"")+' · '+esc(VTYPE_LABEL[p.vtype]||p.vtype)+' · '+esc(p.id)+'</div>'+
      '</div>'+
      '<button class="x" id="closeModal" aria-label="닫기">×</button>'+
    '</div>'+
    '<div class="mb">'+
      '<dl class="kv">'+kv+qReason+'</dl>'+
      '<div class="section-t">핵심 기여</div>'+
      '<div class="freetext">'+ (p.key_contribution? esc(p.key_contribution) : '<span class="muted">기록 없음</span>') +'</div>'+
      '<div class="section-t">한계 · 주의</div>'+
      '<div class="freetext">'+ (p.caveat? esc(p.caveat) : '<span class="muted">기록 없음</span>') +'</div>'+
      '<a class="srclink" href="'+GITHUB_BLOB+esc(p.md)+'" target="_blank" rel="noopener">원본 분석 md 보기 ↗</a>'+
    '</div>';
  el("modal").innerHTML=html;
  el("overlay").classList.add("open");
  document.body.style.overflow="hidden";
  el("closeModal").addEventListener("click",closeDetail);
}
function closeDetail(){
  el("overlay").classList.remove("open");
  document.body.style.overflow="";
}
el("overlay").addEventListener("click",function(e){ if(e.target===el("overlay")) closeDetail(); });
document.addEventListener("keydown",function(e){ if(e.key==="Escape") closeDetail(); });

// ---------- 다중선택 UI ----------
function buildMultiselects(){
  ENUM_FIELDS.forEach(function(f){
    var row = el(MS_GROUP[f.key] || "grpJudge");
    var c={};
    DATA.forEach(function(p){
      if(f.isArray){ (p[f.key]||[]).forEach(function(v){ c[v]=(c[v]||0)+1; }); }
      else { var v=String(p[f.key]); c[v]=(c[v]||0)+1; }
    });
    var vals = f.order.filter(function(v){return c[v];});
    Object.keys(c).forEach(function(v){ if(vals.indexOf(v)<0) vals.push(v); });
    var opts = vals.map(function(v){
      var disp = f.display? f.display(v):v;
      return '<label><input type="checkbox" value="'+esc(v)+'"><span>'+esc(disp)+'</span><span class="cnt">'+c[v]+'</span></label>';
    }).join("");
    var wrap=document.createElement("div");
    wrap.className="ms fld"; wrap.setAttribute("data-key",f.key);
    wrap.innerHTML =
      '<label>'+esc(f.label)+'</label>'+
      '<button type="button" data-btn>'+esc(f.label)+'</button>'+
      '<div class="panel">'+opts+'<button class="clr" type="button">선택 해제</button></div>';
    row.appendChild(wrap);

    var btn=wrap.querySelector("[data-btn]"), panel=wrap.querySelector(".panel");
    btn.addEventListener("click",function(e){
      e.stopPropagation();
      var isOpen=wrap.classList.contains("open");
      closeAllMs();
      if(!isOpen) wrap.classList.add("open");
    });
    panel.addEventListener("click",function(e){ e.stopPropagation(); });
    Array.prototype.forEach.call(panel.querySelectorAll('input[type=checkbox]'),function(cb){
      cb.addEventListener("change",function(){
        var sel=[];
        Array.prototype.forEach.call(panel.querySelectorAll('input:checked'),function(x){ sel.push(x.value); });
        state.enums[f.key]=sel; state.page=1; render();
      });
    });
    wrap.querySelector(".clr").addEventListener("click",function(){
      Array.prototype.forEach.call(panel.querySelectorAll('input:checked'),function(x){ x.checked=false; });
      state.enums[f.key]=[]; state.page=1; render();
    });
  });
}
function closeAllMs(){
  Array.prototype.forEach.call(document.querySelectorAll(".ms.open"),function(m){ m.classList.remove("open"); });
}
document.addEventListener("click",closeAllMs);

// 파세트 동적 카운트: 각 옵션 편수 = "그 필드 선택을 제외한" 나머지 활성 필터 결과 기준. 카운트 span만 갱신.
function updateFacetCounts(){
  ENUM_FIELDS.forEach(function(f){
    var wrap=document.querySelector('.ms[data-key="'+f.key+'"]');
    if(!wrap) return;
    var c={};
    for(var i=0;i<DATA.length;i++){
      var p=DATA[i];
      if(!passes(p,f.key)) continue;
      if(f.isArray){ var arr=p[f.key]||[]; for(var a=0;a<arr.length;a++){ c[arr[a]]=(c[arr[a]]||0)+1; } }
      else { var val=String(p[f.key]); c[val]=(c[val]||0)+1; }
    }
    Array.prototype.forEach.call(wrap.querySelectorAll('.panel label'),function(lab){
      var cb=lab.querySelector('input'); if(!cb) return;
      var n=c[cb.value]||0;
      var span=lab.querySelector('.cnt'); if(span) span.textContent=n;
      lab.classList.toggle('zero', n===0);
    });
  });
}

// ---------- 키워드 칩 검색 ----------
function syncQ(){ state.q = state.chips.join(" "); }
function renderChips(){
  var c=el("chips"), html="";
  state.chips.forEach(function(t,i){
    html += '<span class="chip">'+esc(t)+'<button type="button" class="chipx" data-i="'+i+'" aria-label="키워드 제거">×</button></span>';
  });
  c.innerHTML=html;
  Array.prototype.forEach.call(c.querySelectorAll(".chipx"),function(x){
    x.addEventListener("click",function(e){
      e.stopPropagation();
      var i=parseInt(x.getAttribute("data-i"),10);
      state.chips.splice(i,1); syncQ(); state.page=1; render();
    });
  });
}
function addChips(raw){
  raw.split(",").forEach(function(part){
    var t=part.trim();
    if(t && state.chips.indexOf(t)<0) state.chips.push(t);
  });
  syncQ();
}

// 컨트롤 상태를 state에 맞춤 (프리셋/해시 복원 후)
function syncControls(){
  renderChips();
  el("rateMin").value = state.rateMin===null?"":state.rateMin;
  el("lengthMin").value = state.lengthMin===null?"":state.lengthMin;
  el("yearMin").value = state.yearMin===null?"":state.yearMin;
  el("yearMax").value = state.yearMax===null?"":state.yearMax;
  ENUM_FIELDS.forEach(function(f){
    var wrap=document.querySelector('.ms[data-key="'+f.key+'"]');
    if(!wrap) return;
    var sel=state.enums[f.key];
    var btn=wrap.querySelector("[data-btn]");
    btn.textContent = sel.length? (f.label+" ("+sel.length+")") : f.label;
    btn.classList.toggle("active", sel.length>0);
    Array.prototype.forEach.call(wrap.querySelectorAll('input[type=checkbox]'),function(cb){
      cb.checked = sel.indexOf(cb.value)>=0;
    });
  });
}

// ---------- 입력 바인딩 ----------
function numOrNull(v){ v=v.trim(); if(v==="") return null; var n=Number(v); return isNaN(n)?null:n; }
el("search").addEventListener("keydown",function(e){
  if(e.key==="Enter" || e.key===","){
    e.preventDefault();
    if(this.value.trim()!==""){ addChips(this.value); this.value=""; state.page=1; render(); }
  }else if(e.key==="Backspace" && this.value==="" && state.chips.length){
    state.chips.pop(); syncQ(); state.page=1; render();
  }
});
el("rateMin").addEventListener("input",function(){ state.rateMin=numOrNull(this.value); state.page=1; render(); });
el("lengthMin").addEventListener("input",function(){ state.lengthMin=numOrNull(this.value); state.page=1; render(); });
el("yearMin").addEventListener("input",function(){ state.yearMin=numOrNull(this.value); state.page=1; render(); });
el("yearMax").addEventListener("input",function(){ state.yearMax=numOrNull(this.value); state.page=1; render(); });

// ---------- 프리셋 ----------
function clearFilters(){
  state.q=""; state.chips=[]; state.rateMin=null; state.lengthMin=null; state.yearMin=null; state.yearMax=null;
  ENUM_FIELDS.forEach(function(f){ state.enums[f.key]=[]; });
}
function applyPreset(p){
  clearFilters();
  if(p==="rec"){ state.enums.recommend=["상"]; }
  // clear → 아무것도 안 함
  state.page=1; render();
}
el("presets").addEventListener("click",function(e){
  var btn=e.target.closest("[data-preset]"); if(!btn) return;
  applyPreset(btn.getAttribute("data-preset"));
});

// ---------- URL 해시 (필터 공유) ----------
var _hashLock=false;
function writeHash(){
  if(_hashLock) return;
  var m={};
  if(state.q) m.q=state.q;
  if(state.rateMin!==null) m.rm=state.rateMin;
  if(state.lengthMin!==null) m.lm=state.lengthMin;
  if(state.yearMin!==null) m.y0=state.yearMin;
  if(state.yearMax!==null) m.y1=state.yearMax;
  var ens={};
  ENUM_FIELDS.forEach(function(f){ if(state.enums[f.key].length) ens[f.key]=state.enums[f.key]; });
  if(Object.keys(ens).length) m.e=ens;
  if(state.sort.key!=="year"||state.sort.dir!=="desc") m.s=[state.sort.key,state.sort.dir];
  if(state.page>1) m.p=state.page;
  var str = Object.keys(m).length? encodeURIComponent(JSON.stringify(m)) : "";
  var target = str? "#"+str : "#";
  if(location.hash!==target){ history.replaceState(null,"",target); }
}
function readHash(){
  var h=location.hash.replace(/^#/,"");
  if(!h) return;
  try{
    var m=JSON.parse(decodeURIComponent(h));
    if(m.q){ state.chips=String(m.q).split(/\s+/).filter(Boolean); syncQ(); }
    if(m.rm!==undefined) state.rateMin=m.rm;
    if(m.lm!==undefined) state.lengthMin=m.lm;
    if(m.y0!==undefined) state.yearMin=m.y0;
    if(m.y1!==undefined) state.yearMax=m.y1;
    if(m.e){ ENUM_FIELDS.forEach(function(f){ if(m.e[f.key]) state.enums[f.key]=m.e[f.key]; }); }
    if(m.s){ state.sort={key:m.s[0],dir:m.s[1]}; }
    if(m.p) state.page=m.p;
  }catch(err){ /* 무시 */ }
}

// ---------- 초기화 ----------
fetch("papers.json").then(function(r){ return r.json(); }).then(function(d){
  DATA = d.papers;
  DATA.forEach(function(p){
    p._hay = ((p.title||"")+" "+(p.key_contribution||"")).toLowerCase();
  });
  el("totalCount").textContent = (d.total||DATA.length).toLocaleString("ko");
  buildMultiselects();
  readHash();
  render();
}).catch(function(err){
  el("emptyMsg").style.display="block";
  el("emptyMsg").textContent = "papers.json 로드 실패: "+err;
});
</script>
